name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: python -m pip install -e ".[test]"
      - name: Ruff
        run: python -m ruff check .
      - name: Mypy
        run: python -m mypy runbook
      - name: Pytest
        run: python -m pytest -m "not modal_integration"
